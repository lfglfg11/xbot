[Protocol]
version = "869"

[Framework]
type = "wechat"

[WechatAPIServer]
host = "192.168.6.19"
port = 8848
mode = "debug"
admin-key = "daidai"
redis-host = "127.0.0.1"
redis-port = 6379
redis-password = ""
redis-db = 0
enable-websocket = true
ws-url = "ws://192.168.6.19:8848/ws/GetSyncMsg"
enable-rabbitmq = true
rabbitmq-host = "127.0.0.1"
rabbitmq-port = 5672
rabbitmq-user = "guest"
rabbitmq-password = "guest"
rabbitmq-queue = "example-queue"

[Admin]
enabled = true
host = "0.0.0.0"
port = 9090
username = "admin"
password = "change_me"
debug = true
log_level = "DEBUG"

[Logging]
enable_file_log = true
enable_console_log = true
enable_json_format = false
max_log_files = 10
log_rotation = "1 day"

[Performance]
enabled = true
monitoring_interval = 30
max_history_size = 1000
cpu_alert_threshold = 80
memory_alert_threshold = 85
memory_low_threshold_mb = 500

[XYBot]
version = "v2.0.0"
enable-wechat-login = true
ignore-protection = false
enable-group-wakeup = false
group-wakeup-words = [
    "bot",
    "机器人",
]
robot-names = [
    "bot",
]
robot-wxids = [
    "wxid_xxxxxxxxxxxxx",
]
github-proxy = ""
XYBotDB-url = "sqlite:///database/xybot.db"
msgDB-url = "sqlite+aiosqlite:///database/message.db"
keyvalDB-url = "sqlite+aiosqlite:///database/keyval.db"
admins = [
    "wxid_lnbsshdobq7y22",
    "wxid_admin_2",
]
disabled-plugins = [
    "YujieSajiao",
    "VideoDemand",
    "SendLatestFile",
    "GroupMonitorPlugin",
    "FishingPlugin",
    "Dify",
    "DifyConversationManager",
    "FileDownloader",
    "FileUploadTest",
    "Reminder",
    "RandomPicture",
    "ChatSummary",
    "GroupWelcome",
    "OpenClaw2",
    "Protocol869Demo",
    "grokimage",
    "Music_puls",
    "DouyinParser",
]
timezone = "Asia/Shanghai"
auto-restart = false
files-cleanup-days = 1

[AutoRestart]
enabled = false
check-interval = 60
offline-threshold = 300
max-restart-attempts = 3
restart-cooldown = 1800
check-offline-trace = true
failure-count-threshold = 10
reset-threshold-multiplier = 3
ignore-mode = "None"
whitelist = [
    "wxid_example_1",
    "wxid_example_2",
    "1234567890@chatroom",
]
blacklist = [
    "wxid_block_1",
    "wxid_block_2",
    "333@chatroom",
    "444@chatroom",
]

[Notification]
enabled = false
token = ""
channel = "wechat"
template = "html"
topic = ""
heartbeatThreshold = 3

[Notification.triggers]
offline = true
reconnect = true
restart = true
error = true

[Notification.templates]
offlineTitle = "警告：微信离线通知 - {time}"
offlineContent = "您的微信账号 <b>{wxid}</b> 已于 <span style=\"color:#ff4757;font-weight:bold;\">{time}</span> 离线，请尽快检查您的设备连接状态或重新登录。"
reconnectTitle = "微信重新连接通知 - {time}"
reconnectContent = "您的微信账号 <b>{wxid}</b> 已于 <span style=\"color:#2ed573;font-weight:bold;\">{time}</span> 重新连接。"
restartTitle = "系统重启通知 - {time}"
restartContent = "系统已于 <span style=\"color:#1e90ff;font-weight:bold;\">{time}</span> 重新启动。"
